<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1050" font-family="Iosevka, 'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M25 0H0V25" fill="none" stroke="#2c4a5e" stroke-width="0.4" opacity="0.25"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#c8d8e4"/>
    </marker>
    <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#ff7a2f"/>
    </marker>
  </defs>

  <!-- drafting sheet -->
  <rect width="1400" height="1050" fill="#12222e"/>
  <rect width="1400" height="1050" fill="url(#grid)"/>
  <rect x="18" y="18" width="1364" height="1014" fill="none" stroke="#c8d8e4" stroke-width="1.5"/>
  <rect x="24" y="24" width="1352" height="1002" fill="none" stroke="#c8d8e4" stroke-width="0.5"/>

  <!-- title block -->
  <g stroke="#c8d8e4" stroke-width="0.75" fill="none">
    <rect x="960" y="936" width="416" height="90"/>
    <line x1="960" y1="966" x2="1376" y2="966"/>
    <line x1="960" y1="996" x2="1376" y2="996"/>
    <line x1="1180" y1="966" x2="1180" y2="1026"/>
  </g>
  <text x="972" y="957" fill="#eef4f8" font-size="15" font-weight="bold" letter-spacing="2">KITESHIP — UNCREWED TRIMARAN, KYTOON LAUNCH/RECOVERY</text>
  <text x="972" y="986" fill="#8fb0c4" font-size="11">GENERAL ARRANGEMENT · PLAN + PROFILE</text>
  <text x="1192" y="986" fill="#8fb0c4" font-size="11">SCALE 1:200 (approx)</text>
  <text x="972" y="1016" fill="#8fb0c4" font-size="11">DWG KS-40-GA-001 · REV A · CONCEPT</text>
  <text x="1192" y="1016" fill="#8fb0c4" font-size="11">LOA 40.0 m · BOA 16.0 m · Δ ≈ 200 t</text>

  <!-- ===================== PLAN VIEW ===================== -->
  <text x="60" y="66" fill="#eef4f8" font-size="14" font-weight="bold" letter-spacing="3">PLAN VIEW — MAIN DECK</text>
  <g transform="translate(120,90)">
    <!-- scale: 20 px = 1 m → 40 m = 800 px; centerline at y=170; bow at x=800 (right) -->

    <!-- station grid -->
    <g stroke="#3d5b70" stroke-width="0.5" stroke-dasharray="3 4">
      <line x1="0" y1="20" x2="0" y2="320"/>
      <line x1="200" y1="20" x2="200" y2="320"/>
      <line x1="400" y1="20" x2="400" y2="320"/>
      <line x1="600" y1="20" x2="600" y2="320"/>
      <line x1="800" y1="20" x2="800" y2="320"/>
    </g>
    <g fill="#5f8299" font-size="10">
      <text x="-6" y="14">ST 0 (transom)</text>
      <text x="194" y="14">ST 10</text>
      <text x="394" y="14">ST 20</text>
      <text x="594" y="14">ST 30</text>
      <text x="794" y="14">ST 40 (bow)</text>
    </g>

    <!-- centerline -->
    <line x1="-20" y1="170" x2="830" y2="170" stroke="#5f8299" stroke-width="0.6" stroke-dasharray="14 4 3 4"/>

    <!-- amas (side pontoons), span ST6–ST30 -->
    <g fill="#1b3140" stroke="#c8d8e4" stroke-width="1.2">
      <path d="M120 40 L560 40 Q615 40 630 55 Q615 70 560 70 L120 70 Q105 55 120 40 Z"/>
      <path d="M120 270 L560 270 Q615 270 630 285 Q615 300 560 300 L120 300 Q105 285 120 270 Z"/>
    </g>
    <text x="330" y="60" fill="#8fb0c4" font-size="10">AMA (PS) — He RESERVE · FUEL · TRIM BALLAST</text>
    <text x="330" y="290" fill="#8fb0c4" font-size="10">AMA (SB) — He RESERVE · FUEL · TRIM BALLAST</text>

    <!-- cross-beams -->
    <g fill="#22394a" stroke="#c8d8e4" stroke-width="1">
      <rect x="150" y="70" width="46" height="200"/>
      <rect x="480" y="70" width="46" height="200"/>
    </g>
    <text x="158" y="118" fill="#8fb0c4" font-size="9" transform="rotate(90 158 118)">AFT X-BEAM</text>
    <text x="488" y="118" fill="#8fb0c4" font-size="9" transform="rotate(90 488 118)">FWD X-BEAM</text>

    <!-- tether traveller on aft cross-beam -->
    <line x1="173" y1="78" x2="173" y2="262" stroke="#ff7a2f" stroke-width="3"/>
    <circle cx="173" cy="170" r="7" fill="#ff7a2f"/>
    <circle cx="173" cy="92" r="4" fill="none" stroke="#ff7a2f" stroke-width="1.5"/>
    <circle cx="173" cy="248" r="4" fill="none" stroke="#ff7a2f" stroke-width="1.5"/>
    <text x="205" y="255" fill="#ff7a2f" font-size="10">TETHER TRAVELLER (PS↔SB, ±8 m off CL)</text>

    <!-- center hull -->
    <path d="M40 130 L560 130 Q740 130 800 170 Q740 210 560 210 L40 210 Q20 170 40 130 Z"
          fill="#1b3140" stroke="#eef4f8" stroke-width="1.8"/>

    <!-- kite stowage bay aft -->
    <rect x="48" y="140" width="96" height="60" fill="#16354a" stroke="#ff7a2f" stroke-width="1" stroke-dasharray="5 3"/>
    <text x="56" y="165" fill="#ff7a2f" font-size="9">KITE BAY</text>
    <text x="56" y="178" fill="#ff7a2f" font-size="9">roller packer</text>
    <text x="56" y="191" fill="#ff7a2f" font-size="9">clamshell hatch</text>

    <!-- winch pit -->
    <circle cx="185" cy="170" r="16" fill="#16354a" stroke="#ff7a2f" stroke-width="1.5"/>
    <circle cx="185" cy="170" r="6" fill="none" stroke="#ff7a2f" stroke-width="1"/>
    <text x="160" y="228" fill="#ff7a2f" font-size="9">WINCH PIT · 500 m DYNEEMA · 5 t WL</text>

    <!-- arm rail + turret -->
    <line x1="230" y1="170" x2="470" y2="170" stroke="#ffd23f" stroke-width="4"/>
    <circle cx="330" cy="170" r="12" fill="#ffd23f"/>
    <circle cx="330" cy="170" r="5" fill="#12222e"/>
    <text x="238" y="156" fill="#ffd23f" font-size="9">ARM RAIL (ST 11.5 → ST 23.5)</text>
    <!-- arm reach envelope -->
    <circle cx="330" cy="170" r="150" fill="none" stroke="#ffd23f" stroke-width="0.8" stroke-dasharray="6 5"/>
    <text x="330" y="342" fill="#ffd23f" font-size="9" text-anchor="middle">ARM REACH ENVELOPE r = 15 m (sweeps full rail: 27 m × 30 m coverage)</text>

    <!-- drone garage fwd -->
    <g fill="#16354a" stroke="#7fd4a8" stroke-width="1">
      <rect x="500" y="142" width="60" height="24"/>
      <rect x="500" y="174" width="60" height="24"/>
      <rect x="570" y="142" width="60" height="24"/>
      <rect x="570" y="174" width="60" height="24"/>
      <rect x="640" y="150" width="52" height="40"/>
    </g>
    <text x="500" y="134" fill="#7fd4a8" font-size="9">DRONE GARAGE — 4× CELL (100–500 kg class) + SVC BAY</text>
    <text x="648" y="174" fill="#7fd4a8" font-size="9">SVC</text>

    <!-- capture line hardpoint note -->
    <circle cx="173" cy="170" r="2" fill="#ff7a2f"/>

    <!-- beam dimension -->
    <g stroke="#c8d8e4" stroke-width="0.7">
      <line x1="680" y1="40" x2="680" y2="300" marker-start="url(#arr)" marker-end="url(#arr)"/>
      <line x1="655" y1="40" x2="700" y2="40" stroke-width="0.4"/>
      <line x1="655" y1="300" x2="700" y2="300" stroke-width="0.4"/>
    </g>
    <text x="690" y="175" fill="#c8d8e4" font-size="11">16.0 m BOA</text>

    <!-- LOA dimension -->
    <g stroke="#c8d8e4" stroke-width="0.7">
      <line x1="0" y1="362" x2="800" y2="362" marker-start="url(#arr)" marker-end="url(#arr)"/>
    </g>
    <text x="620" y="356" fill="#c8d8e4" font-size="11">40.0 m LOA</text>
  </g>

  <!-- ===================== PROFILE VIEW ===================== -->
  <text x="60" y="530" fill="#eef4f8" font-size="14" font-weight="bold" letter-spacing="3">PROFILE — RECOVERY CONFIGURATION (KYTOON WINCHED TO 20 m)</text>
  <g transform="translate(120,560)">
    <!-- waterline at y=300; 20 px = 1 m horizontally, ~7 px = 1 m vertically for air column (compressed, noted) -->

    <!-- sea -->
    <line x1="-40" y1="300" x2="1180" y2="300" stroke="#5fa8c9" stroke-width="1.4"/>
    <path d="M-40 306 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0 q15 5 30 0 q15 -5 30 0" fill="none" stroke="#3d6f8c" stroke-width="0.8"/>
    <text x="1100" y="296" fill="#5fa8c9" font-size="9">WL</text>

    <!-- hull profile: bow right at x=800, transom x=0 -->
    <path d="M10 300 L4 268 L30 252 L770 252 Q800 262 806 300 Z"
          fill="#1b3140" stroke="#eef4f8" stroke-width="1.8"/>
    <!-- deckhouse / mast -->
    <rect x="560" y="228" width="120" height="24" fill="#22394a" stroke="#c8d8e4" stroke-width="1"/>
    <line x1="620" y1="228" x2="620" y2="192" stroke="#c8d8e4" stroke-width="1.5"/>
    <text x="632" y="200" fill="#8fb0c4" font-size="9">SENSOR/COMMS MAST</text>
    <!-- ama shown dashed behind -->
    <path d="M130 300 L136 276 L610 276 L622 300 Z" fill="none" stroke="#8fb0c4" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="330" y="292" fill="#8fb0c4" font-size="9">AMA (beyond)</text>

    <!-- kite bay hatch aft -->
    <rect x="40" y="246" width="100" height="8" fill="#ff7a2f" opacity="0.8"/>
    <text x="34" y="242" fill="#ff7a2f" font-size="9">KITE BAY HATCH</text>

    <!-- winch below deck -->
    <circle cx="185" cy="272" r="10" fill="none" stroke="#ff7a2f" stroke-width="1.5"/>
    <text x="150" y="292" fill="#ff7a2f" font-size="9">WINCH</text>

    <!-- fairlead/traveller -->
    <circle cx="173" cy="250" r="4" fill="#ff7a2f"/>

    <!-- tether up to kytoon at ~20m (7px/m → 140px above deck) -->
    <line x1="173" y1="250" x2="345" y2="66" stroke="#ff7a2f" stroke-width="1.6"/>
    <text x="200" y="150" fill="#ff7a2f" font-size="9" transform="rotate(-47 210 150)">TETHER · DYNEEMA + FO/COND.</text>

    <!-- kytoon: LEI wing, helium LE tube (pale cyan = He volume, distinct from tether) -->
    <g transform="translate(345,52) rotate(-8)">
      <path d="M0 14 Q60 -18 150 6 Q80 34 8 26 Q-4 20 0 14 Z" fill="#22394a" stroke="#eef4f8" stroke-width="1.6"/>
      <path d="M0 14 Q60 -18 150 6" fill="none" stroke="#9fe0ff" stroke-width="5" stroke-linecap="round"/>
      <!-- bridle -->
      <path d="M4 22 L0 14 M50 22 L0 14 M110 22 L0 14" stroke="#c8d8e4" stroke-width="0.6" fill="none" transform="translate(0,0)"/>
      <!-- grapple fixture on LE underside -->
      <circle cx="60" cy="26" r="3.5" fill="#ffd23f"/>
    </g>
    <text x="510" y="52" fill="#eef4f8" font-size="10">KYTOON — 400 m² LEI · <tspan fill="#9fe0ff">He IN LE TUBE + STRUTS</tspan></text>
    <text x="510" y="66" fill="#ffd23f" font-size="9">◉ GRAPPLE FIXTURE, LE UNDERSIDE (passive, ISS-style) — shown captured</text>
    <text x="510" y="80" fill="#8fb0c4" font-size="9">EO/IR POD + IMU/GNSS · CAPTURE LINE HARDPOINT</text>

    <!-- arm reaching up, end-effector docked on grapple fixture -->
    <g stroke="#ffd23f" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M330 250 L318 190 L372 122 L403 74"/>
    </g>
    <circle cx="330" cy="250" r="7" fill="#ffd23f"/>
    <circle cx="318" cy="190" r="5" fill="#ffd23f"/>
    <circle cx="372" cy="122" r="5" fill="#ffd23f"/>
    <circle cx="406" cy="70" r="7" fill="none" stroke="#ffd23f" stroke-width="2.5"/>
    <text x="252" y="176" fill="#ffd23f" font-size="9">7-DOF ARM ON RAIL</text>
    <text x="252" y="189" fill="#ffd23f" font-size="9">15 m reach · compliant EE</text>

    <!-- altitude dim: 20 m hover -->
    <g stroke="#c8d8e4" stroke-width="0.7">
      <line x1="120" y1="60" x2="120" y2="300" marker-start="url(#arr)" marker-end="url(#arr)"/>
    </g>
    <text x="60" y="180" fill="#c8d8e4" font-size="10">≈ 20 m</text>
    <text x="46" y="194" fill="#5f8299" font-size="8">(hover capture)</text>

    <!-- ops altitude note, broken axis -->
    <g stroke="#5f8299" stroke-width="0.8">
      <line x1="470" y1="30" x2="482" y2="18"/>
      <line x1="476" y1="30" x2="488" y2="18"/>
    </g>
    <text x="496" y="26" fill="#5f8299" font-size="9">OPS ALTITUDE 150–400 m (not to scale) — ISR HORIZON 60+ km · DRONE FERRY RELEASE POINT</text>

    <!-- drone garage under fwd deck -->
    <g fill="#16354a" stroke="#7fd4a8" stroke-width="1">
      <rect x="500" y="258" width="54" height="18"/>
      <rect x="562" y="258" width="54" height="18"/>
      <rect x="624" y="258" width="54" height="18"/>
    </g>
    <text x="500" y="252" fill="#7fd4a8" font-size="9" opacity="0">.</text>
    <text x="690" y="272" fill="#7fd4a8" font-size="9">DRONE CELLS</text>

    <!-- trolley on tether -->
    <rect x="248" y="164" width="14" height="10" rx="2" fill="#7fd4a8" transform="rotate(-47 255 169)"/>
    <text x="266" y="188" fill="#7fd4a8" font-size="9">LAUNCH TROLLEY (drone ferry)</text>

    <!-- scale bar -->
    <g transform="translate(820,352)">
      <rect x="0" y="0" width="100" height="8" fill="#eef4f8"/>
      <rect x="100" y="0" width="100" height="8" fill="#2c4a5e" stroke="#eef4f8" stroke-width="0.7"/>
      <text x="0" y="24" fill="#c8d8e4" font-size="10">0</text>
      <text x="92" y="24" fill="#c8d8e4" font-size="10">5 m</text>
      <text x="188" y="24" fill="#c8d8e4" font-size="10">10 m</text>
    </g>
  </g>

  <!-- legend -->
  <g transform="translate(60,940)">
    <rect x="0" y="0" width="14" height="14" fill="#ff7a2f"/>
    <text x="22" y="12" fill="#c8d8e4" font-size="11">KITE / TETHER SYSTEM</text>
    <rect x="220" y="0" width="14" height="14" fill="#ffd23f"/>
    <text x="242" y="12" fill="#c8d8e4" font-size="11">MANIPULATOR ARM</text>
    <rect x="420" y="0" width="14" height="14" fill="#7fd4a8"/>
    <text x="442" y="12" fill="#c8d8e4" font-size="11">DRONE HANDLING</text>
    <rect x="620" y="0" width="14" height="14" fill="#1b3140" stroke="#eef4f8"/>
    <text x="642" y="12" fill="#c8d8e4" font-size="11">STRUCTURE</text>
  </g>
</svg>
